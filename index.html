<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hill Cipher | UX-Engine Pro</title>

    <!-- Professional Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap"
        rel="stylesheet">

    <!-- Dependencies -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --bg: #050508;
            --accent: #a78bfa;
            --accent-glow: #c084fc;
            --cyan: #22d3ee;
            --pink: #f472b6;
            --accent-soft: rgba(167, 139, 250, 0.2);
            --border: rgba(255, 255, 255, 0.08);
            --header-h: 70px;
            --sidebar-w: 380px;
            --radius: 1rem;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            /* Prevent page scroll */
        }

        /* --- Header: Always Sticky & Informative --- */
        .app-header {
            height: var(--header-h);
            background: rgba(15, 15, 22, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            z-index: 100;
        }

        .result-hud {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(139, 92, 246, 0.1);
            padding: 0.5rem 1rem;
            border-radius: 10px;
            border: 1px solid var(--accent);
            animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {

            0%,
            100% {
                border-color: rgba(139, 92, 246, 0.3);
            }

            50% {
                border-color: var(--accent);
            }
        }

        /* --- Main Layout: Two-Pane Fixed --- */
        .app-body {
            flex: 1;
            display: flex;
            min-height: 0;
            /* Critical for inner scrolling */
        }

        /* Left Side: Controls (Fixed) */
        .sidebar {
            width: var(--sidebar-w);
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 1.5rem;
            gap: 2rem;
        }

        /* Right Side: Workspace (Scrollable) */
        .workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at 50% 50%, rgba(139, 92, 246, 0.02), transparent);
            min-width: 0;
        }

        .workspace-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
        }

        .max-width-limit {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        /* --- Grid System for Math Steps --- */
        .steps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 1.5rem;
        }

        /* --- UI Elements --- */
        .section-label {
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--accent);
            opacity: 0.8; /* Reduced weight */
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 0.75rem;
            display: block;
        }

        .fui-input,
        .fui-select {
            width: 100%;
            background: #000;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            color: #fff;
            font-size: 0.9rem;
            transition: all var(--transition);
        }

        .fui-input:hover, .fui-select:hover {
            border-color: rgba(255, 255, 255, 0.2);
        }

        .fui-input:focus {
            border-color: var(--accent);
            outline: none;
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.2);
            transform: translateY(-2px);
        }

        .btn {
            cursor: pointer;
            border: none;
            border-radius: 10px;
            padding: 0.75rem 1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all var(--transition);
        }

        .btn-p {
            background: rgba(167, 139, 250, 0.1);
            color: var(--accent);
            border: 1px solid var(--accent);
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.1);
        }

        .btn-p:hover {
            background: linear-gradient(135deg, var(--accent), var(--pink));
            color: white;
            border-color: transparent;
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 10px 25px rgba(244, 114, 182, 0.4);
        }

        .btn-p:active {
            transform: translateY(0) scale(0.98);
        }

        .btn-s {
            background: transparent;
            border: 1px solid var(--border);
            color: #fff;
        }

        .btn-s:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .btn-s:active {
            transform: translateY(0);
        }

        /* Step Card */
        .step-card {
            background: #0f172a; /* Slate-900 for better base visibility */
            border: 2px solid var(--border);
            border-radius: 1.25rem;
            padding: 2rem;
            position: relative;
            transition: all var(--transition);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            opacity: 1 !important; /* Force visibility */
        }

        .step-card:hover {
            border-color: var(--pink);
            transform: translateY(-8px) scale(1.02);
            /* Colorful multi-layer shadow */
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.4),
                0 0 20px rgba(167, 139, 250, 0.2),
                0 0 40px rgba(34, 211, 238, 0.1);
            background: linear-gradient(145deg, #0f172a, #1e1b4b);
        }

        .math-block {
            background: #020617; /* Very dark slate but not pure black */
            padding: 1.5rem;
            border-radius: 12px;
            margin-top: 1.25rem;
            border-left: 2px solid var(--accent); /* Thinned from 4px */
            font-size: 1.3rem;
            color: #ffffff; /* Explicitly white */
            overflow-x: auto;
            display: flex;
            justify-content: center;
        }

        /* --- Mobile Tabs (UX FIX) --- */
        .mobile-tabs {
            display: none;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
        }

        .tab-btn {
            flex: 1;
            padding: 1rem;
            background: none;
            border: none;
            color: var(--text-dim);
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            cursor: pointer;
        }

        .tab-btn.active {
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
        }

        @media (max-width: 1024px) {
            .app-body {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: 100%;
                display: none;
                /* Controlled by tabs */
                position: absolute;
                background: var(--bg);
                z-index: 10;
            }

            .sidebar.active {
                display: flex;
            }

            .workspace {
                height: 100%;
            }

            .mobile-tabs {
                display: flex;
            }

            .steps-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Custom Scrollbar - Thinner and more subtle */
        ::-webkit-scrollbar {
            width: 3px;
            height: 3px; /* Added height for horizontal scrollbars */
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(167, 139, 250, 0.3); /* Transparent subtle purple */
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header class="app-header">
        <div style="display: flex; align-items: center; gap: 0.75rem;">
            <div
                style="width: 32px; height: 32px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center;">
                <i data-lucide="shield" style="width:18px; color:white;"></i>
            </div>
            <h1 style="font-size: 1rem; font-weight: 800; letter-spacing: -0.5px;">AEGIS_PRO</h1>
        </div>

        <div id="res-hud" class="result-hud" style="display: none;">
            <span style="font-size: 0.7rem; font-weight: 800; color: var(--accent);">RESULT:</span>
            <span id="res-val"
                style="font-family: 'JetBrains Mono', monospace; font-size: 1rem; letter-spacing: 2px;"></span>
            <div style="display: flex; gap: 0.5rem; margin-left: 10px;">
                <button id="m-copy" style="background:none; border:none; color:white; cursor:pointer; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'">
                    <i data-lucide="copy" style="width:16px;"></i>
                </button>
                <button id="m-swap" style="background:none; border:none; color:var(--accent); cursor:pointer; transition: transform 0.3s;" onmouseover="this.style.transform='rotate(180deg) scale(1.2)'" onmouseout="this.style.transform='rotate(0deg) scale(1)'">
                    <i data-lucide="repeat" style="width:16px;"></i>
                </button>
            </div>
        </div>

        <div id="det-pill" style="font-size: 0.7rem; font-weight: 700; color: var(--cyan);">DET: --</div>
    </header>

    <!-- Mobile Tabs -->
    <nav class="mobile-tabs">
        <button id="tab-config" class="tab-btn active">Configuration</button>
        <button id="tab-math" class="tab-btn">Analysis</button>
    </nav>

    <!-- Body Layout -->
    <div class="app-body">

        <!-- Sidebar: Fixed Controls -->
        <aside id="sidebar" class="sidebar active">
            <div>
                <label class="section-label">Matrix Size</label>
                <select id="m-size" class="fui-select">
                    <option value="2">2 × 2 Standard</option>
                    <option value="3">3 × 3 Advanced</option>
                </select>
            </div>

            <div>
                <label class="section-label">Key Matrix</label>
                <div style="background: #000; padding: 1rem; border-radius: 12px; border: 1px dashed var(--border);">
                    <div id="m-grid" style="display: grid; gap: 0.5rem;"></div>
                    <button id="m-rand" class="btn btn-s" style="width:100%; margin-top:1rem; font-size: 0.75rem;">
                        <i data-lucide="zap" style="width:14px;"></i> Optimize Key
                    </button>
                </div>
            </div>

            <div>
                <label class="section-label">Message Payload</label>
                <textarea id="m-text" class="fui-input" rows="4" placeholder="Input message..."></textarea>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-top: 1rem;">
                    <button id="m-enc" class="btn btn-p"><i data-lucide="lock"></i> Encrypt</button>
                    <button id="m-dec" class="btn btn-s"><i data-lucide="unlock"></i> Decrypt</button>
                </div>
            </div>

            <div style="margin-top: auto;">
                <label class="section-label">Terminal</label>
                <div id="log"
                    style="font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: #10b981; background: #000; padding: 0.75rem; border-radius: 8px; height: 100px; overflow-y: auto;">
                    <div>> System Online.</div>
                </div>
            </div>
        </aside>

        <!-- Workspace: Scrollable Analysis -->
        <main class="workspace">
            <div class="workspace-scroll">
                <div class="max-width-limit">
                    <div id="empty-state" style="text-align: center; margin-top: 20vh; opacity: 0.2;">
                        <i data-lucide="cpu" style="width: 64px; height: 64px; margin-bottom: 1.5rem;"></i>
                        <h2 style="font-size: 1.5rem;">Awaiting Data Transmission</h2>
                        <p>Configure parameters to start cryptographic analysis.</p>
                    </div>
                    <div id="steps-list" class="steps-grid"></div>
                </div>
            </div>
        </main>

    </div>

    <script>
        // --- Cipher Engine ---
        const MOD = 26;
        const mod = (n, m) => ((n % m) + m) % m;
        const modInverse = (a, m) => {
            a = mod(a, m);
            for (let x = 1; x < m; x++) if (mod(a * x, m) === 1) return x;
            return null;
        };
        const matMul = (A, B) => {
            const rA = A.length, cA = A[0].length, cB = B[0].length;
            let C = Array(rA).fill().map(() => Array(cB).fill(0));
            for (let i = 0; i < rA; i++)
                for (let j = 0; j < cB; j++)
                    for (let k = 0; k < cA; k++)
                        C[i][j] = mod(C[i][j] + A[i][k] * B[k][j], MOD);
            return C;
        };
        const det2 = (m) => mod(m[0][0] * m[1][1] - m[0][1] * m[1][0], MOD);
        const det3 = (m) => mod(
            m[0][0] * (m[1][1] * m[2][2] - m[1][2] * m[2][1]) -
            m[0][1] * (m[1][0] * m[2][2] - m[1][2] * m[2][0]) +
            m[0][2] * (m[1][0] * m[2][1] - m[1][1] * m[2][0]),
            MOD
        );
        const getInverse = (matrix, size) => {
            const d = size === 2 ? det2(matrix) : det3(matrix);
            const invD = modInverse(d, MOD);
            if (!invD) return null;
            if (size === 2) {
                return [[mod(matrix[1][1] * invD, MOD), mod(-matrix[0][1] * invD, MOD)],
                [mod(-matrix[1][0] * invD, MOD), mod(matrix[0][0] * invD, MOD)]];
            } else {
                const cof = [[mod(matrix[1][1] * matrix[2][2] - matrix[1][2] * matrix[2][1], MOD), mod(-(matrix[1][0] * matrix[2][2] - matrix[1][2] * matrix[2][0]), MOD), mod(matrix[1][0] * matrix[2][1] - matrix[1][1] * matrix[2][0], MOD)],
                [mod(-(matrix[0][1] * matrix[2][2] - matrix[0][2] * matrix[2][1]), MOD), mod(matrix[0][0] * matrix[2][2] - matrix[0][2] * matrix[2][0], MOD), mod(-(matrix[0][0] * matrix[2][1] - matrix[0][1] * matrix[2][0]), MOD)],
                [mod(matrix[0][1] * matrix[1][2] - matrix[0][2] * matrix[1][1], MOD), mod(-(matrix[0][0] * matrix[1][2] - matrix[0][2] * matrix[1][0]), MOD), mod(matrix[0][0] * matrix[1][1] - matrix[0][1] * matrix[1][0], MOD)]];
                return Array(3).fill().map((_, i) => Array(3).fill().map((_, j) => mod(cof[j][i] * invD, MOD)));
            }
        };

        // --- Controller ---
        class AegisUX {
            constructor() {
                this.sidebar = document.getElementById('sidebar');
                this.els = {
                    size: document.getElementById('m-size'),
                    grid: document.getElementById('m-grid'),
                    text: document.getElementById('m-text'),
                    list: document.getElementById('steps-list'),
                    empty: document.getElementById('empty-state'),
                    log: document.getElementById('log'),
                    det: document.getElementById('det-pill'),
                    resVal: document.getElementById('res-val'),
                    resHud: document.getElementById('res-hud')
                };
                this.init();
            }

            init() {
                this.els.size.onchange = () => this.buildGrid();
                document.getElementById('m-rand').onclick = () => this.randomize();
                document.getElementById('m-enc').onclick = () => this.execute('encrypt');
                document.getElementById('m-dec').onclick = () => this.execute('decrypt');
                document.getElementById('m-copy').onclick = () => this.copy();
                document.getElementById('m-swap').onclick = () => this.swap();

                // Mobile Tabs
                document.getElementById('tab-config').onclick = (e) => this.switchTab('config', e.target);
                document.getElementById('tab-math').onclick = (e) => this.switchTab('math', e.target);

                this.buildGrid();
                lucide.createIcons();
            }

            switchTab(tab, btn) {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                if (tab === 'config') this.sidebar.classList.add('active');
                else this.sidebar.classList.remove('active');
            }

            log(msg) {
                const div = document.createElement('div');
                div.textContent = `> ${msg}`;
                this.els.log.prepend(div);
                if (this.els.log.children.length > 8) this.els.log.lastElementChild.remove();
            }

            buildGrid() {
                const s = parseInt(this.els.size.value);
                this.els.grid.style.gridTemplateColumns = `repeat(${s}, 1fr)`;
                this.els.grid.innerHTML = '';
                for (let i = 0; i < s * s; i++) {
                    const input = document.createElement('input');
                    input.type = 'number';
                    input.className = 'fui-input';
                    input.style.textAlign = 'center';
                    input.style.fontFamily = 'var(--font-mono)';
                    input.style.transition = 'all 0.2s cubic-bezier(0.4, 0, 0.2, 1)';
                    input.value = Math.floor(Math.random() * 26);
                    input.oninput = () => this.updateDet();
                    
                    // Colorful Hover effect for cells
                    input.onmouseover = () => { 
                        input.style.borderColor = 'var(--pink)'; 
                        input.style.transform = 'scale(1.1)';
                        input.style.boxShadow = '0 0 15px rgba(244, 114, 182, 0.3)';
                    };
                    input.onmouseout = () => { 
                        input.style.borderColor = 'var(--border)'; 
                        input.style.transform = 'scale(1)';
                        input.style.boxShadow = 'none';
                    };
                    
                    this.els.grid.appendChild(input);
                }
                this.updateDet();
            }

            updateDet() {
                const k = this.getKey();
                const d = k.length === 2 ? det2(k) : det3(k);
                const ok = modInverse(d, MOD) !== null;
                this.els.det.textContent = `DET: ${d} [${ok ? 'OK' : 'ERR'}]`;
                this.els.det.style.color = ok ? 'var(--cyan)' : '#f87171';
            }

            getKey() {
                const s = parseInt(this.els.size.value);
                const inputs = Array.from(this.els.grid.querySelectorAll('input'));
                const k = [];
                for (let i = 0; i < s; i++) k.push(inputs.slice(i * s, i * s + s).map(c => mod(parseInt(c.value) || 0, MOD)));
                return k;
            }

            randomize() {
                this.log("Optimizing key...");
                for (let i = 0; i < 500; i++) {
                    this.els.grid.querySelectorAll('input').forEach(c => c.value = Math.floor(Math.random() * 26));
                    const k = this.getKey();
                    if (modInverse(k.length === 2 ? det2(k) : det3(k), MOD)) {
                        this.log("Valid parameters found.");
                        this.updateDet();
                        return;
                    }
                }
            }

            async execute(mode) {
                const raw = this.els.text.value.toUpperCase().replace(/[^A-Z]/g, '');
                if (!raw) return this.log("Error: Data link empty.");
                const s = parseInt(this.els.size.value);
                const k = this.getKey();
                if (!modInverse(s === 2 ? det2(k) : det3(k), MOD)) return this.log("Error: Invalid matrix.");

                // Auto switch to math tab on mobile
                if (window.innerWidth < 1024) this.switchTab('math', document.getElementById('tab-math'));

                this.els.empty.style.display = 'none';
                this.els.list.innerHTML = '';
                this.log(`Initiating ${mode}...`);
                
                // Auto-scroll steps area to top
                document.querySelector('.workspace-scroll').scrollTo({ top: 0, behavior: 'smooth' });

                let text = raw;
                if (text.length % s !== 0) text += 'X'.repeat(s - (text.length % s));

                const keyMat = mode === 'encrypt' ? k : getInverse(k, s);
                this.addStep("TRANSFORMATION_KEY", `K = ${this.toTex(keyMat)}`);

                const results = [];
                for (let i = 0; i < text.length; i += s) {
                    const B = text.slice(i, i + s).split('').map(c => c.charCodeAt(0) - 65);
                    const R = matMul(keyMat, B.map(n => [n])).map(r => r[0]);
                    results.push(...R);
                    this.addStep(`BLOCK_${i / s + 1}`, `${this.toTex(keyMat)} \\begin{bmatrix} ${B.join(' \\\\ ')} \\end{bmatrix} \\equiv \\begin{bmatrix} ${R.join(' \\\\ ')} \\end{bmatrix} \\pmod{26}`);
                }

                this.els.resVal.textContent = results.map(n => String.fromCharCode(n + 65)).join('');
                this.els.resHud.style.display = 'flex';
                this.log("Processing complete.");
                
                // Rapid entrance animation
                gsap.from(".step-card", { 
                    opacity: 0, 
                    y: 15, 
                    stagger: 0.03, 
                    duration: 0.3, 
                    ease: "power2.out",
                    clearProps: "all" // Important: clear styles after animation
                });
            }

            addStep(title, math) {
                const d = document.createElement('div');
                d.className = 'step-card';
                d.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
                        <h3 style="font-size:0.8rem; color:var(--accent); font-weight:800; letter-spacing:1px;">[ANALYSIS_${title}]</h3>
                        <div style="width:10px; height:10px; background:var(--accent); border-radius:50%; box-shadow: 0 0 10px var(--accent);"></div>
                    </div>
                    <div class="math-block"></div>
                `;
                this.els.list.appendChild(d);
                katex.render(math, d.querySelector('.math-block'), { displayMode: true, throwOnError: false });
            }

            swap() {
                this.els.text.value = this.els.resVal.textContent;
                this.log("Result swapped to input.");
                if (window.innerWidth < 1024) this.switchTab('config', document.getElementById('tab-config'));
            }

            toTex(m) { return `\\begin{bmatrix} ${m.map(r => r.join(' & ')).join(' \\\\ ')} \\end{bmatrix}`; }
            copy() { navigator.clipboard.writeText(this.els.resVal.textContent); this.log("Copied."); }
        }

        window.onload = () => new AegisUX();
    </script>
</body>

</html>
